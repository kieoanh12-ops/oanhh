<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Điểm Phát Âm Tiếng Trung HSK</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        /* Bộ lọc HSK */
        .hsk-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .hsk-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
            transition: all 0.2s;
        }
        .hsk-btn.active {
            background-color: #ff7675;
            color: white;
            border-color: #ff7675;
        }
        /* Thẻ hiển thị từ vựng */
        .flashcard {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .hsk-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #dfe6e9;
            color: #2d3436;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .chinese {
            font-size: 46px;
            color: #2d3436;
            font-weight: bold;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }
        .pinyin {
            font-size: 20px;
            color: #d63031;
            margin: 0 0 8px 0;
            font-weight: 500;
        }
        .meaning {
            font-size: 16px;
            color: #636e72;
            font-style: italic;
            margin: 0;
        }
        /* Khu vực nút bấm */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-group-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        #btn-listen { background-color: #fdcb6e; color: #2d3436; }
        #btn-start { background-color: #2ecc71; color: white; }
        #btn-stop { background-color: #e74c3c; color: white; }
        #btn-next { background-color: #0984e3; color: white; }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: #b2bec3 !important; cursor: not-allowed; transform: none; }
        
        /* Kết quả */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background-color: #f1f2f6;
            text-align: left;
            display: none;
        }
        .score {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Chấm Điểm Phát Âm Tiếng Trung
        Trương Thị Kiều Oanh</h1>
    
    <div class="hsk-filter">
        <button class="hsk-btn active" onclick="changeLevel('ALL')">Tất cả</button>
        <button class="hsk-btn" onclick="changeLevel(1)">HSK 1</button>
        <button class="hsk-btn" onclick="changeLevel(2)">HSK 2</button>
        <button class="hsk-btn" onclick="changeLevel(3)">HSK 3</button>
    </div>
    
    <div class="flashcard">
        <span class="hsk-badge" id="txt-level">HSK 1</span>
        <p class="chinese" id="txt-chinese">你好</p>
        <p class="pinyin" id="txt-pinyin">nǐ hǎo</p>
        <p class="meaning" id="txt-meaning">Xin chào</p>
    </div>

    <div class="btn-group">
        <button id="btn-listen" onclick="speakSample()">🔊 Nghe đọc thử</button>
        <button id="btn-start" onclick="startRecognition()">🎙️ Bắt đầu nói</button>
    </div>
    <div class="btn-group-bottom">
        <button id="btn-stop" onclick="stopRecognition()" disabled>🛑 Kết thúc nói</button>
        <button id="btn-next" onclick="nextSentence()">⏭️ Đổi câu khác</button>
    </div>

    <div class="result-box" id="result-box">
        <div class="score" id="txt-score">Điểm số: --</div>
        <p><strong>Hệ thống nghe được:</strong> <span id="txt-user-speech" style="color: #0984e3; font-weight: bold;"></span></p>
        <p id="txt-feedback" style="font-size: 14px; margin: 5px 0 0 0; font-weight: 500;"></p>
    </div>
</div>

<script>
    // Ngân hàng dữ liệu phân loại theo HSK 1, 2, 3
    const sentenceBank = [
        // HSK 1
        { zh: "你好", py: "nǐ hǎo", vi: "Xin chào", level: 1 },
        { zh: "谢谢你", py: "xièxie nǐ", vi: "Cảm ơn bạn", level: 1 },
        { zh: "我喜欢学汉语", py: "wǒ xǐhuan xué hànyǔ", vi: "Tôi thích học tiếng Trung", level: 1 },
        { zh: "你会 làm 什么？", py: "nǐ huì zuò shénme?", vi: "Bạn biết làm gì?", level: 1 },
        // HSK 2
        { zh: "今天天气很好", py: "jīntiān tiānqì hěn hǎo", vi: "Hôm nay thời tiết rất đẹp", level: 2 },
        { zh: "我想去中国旅遊", py: "wǒ xiǎng qù zhōngguó lǚyóu", vi: "Tôi muốn đi du lịch Trung Quốc", level: 2 },
        { zh: "你会 nói 汉语吗？", py: "nǐ huì shuō hànyǔ ma?", vi: "Bạn biết nói tiếng Trung không?", level: 2 },
        // HSK 3
        { zh: "虽然很难，但是我不会放弃", py: "suīrán hěn nán, dànshì wǒ búhuì fàngqì", vi: "Tuy rằng rất khó, nhưng tôi sẽ không từ bỏ", level: 3 },
        { zh: "你对这个问题有什么看法？", py: "nǐ duì zhège wèntí yǒu shénme kànfǎ?", vi: "Bạn có ý kiến gì về vấn đề này?", level: 3 },
        { zh: "我们需要常常複习", py: "wǒmen xūyào chángcháng fùxí", vi: "Chúng ta cần phải thường xuyên ôn tập", level: 3 }
    ];

    let currentFilteredList = [...sentenceBank];
    let currentIndex = 0;
    let currentLevel = 'ALL';
    let recognition;
    let isUserStopped = false; // Ghi nhận nếu người dùng chủ động bấm "Kết thúc nói"

    // Khởi tạo Nhận diện giọng nói (Speech Recognition)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN'; 
        recognition.continuous = true; // Cho phép nói dài, chỉ dừng khi bấm nút hoặc timeout
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            // Lấy kết quả của phân đoạn nói cuối cùng
            const lastResultIndex = event.results.length - 1;
            const userSpeech = event.results[lastResultIndex][0].transcript;
            const confidence = event.results[lastResultIndex][0].confidence;
            
            analyzeSpeech(userSpeech, confidence);
        };

        recognition.onend = function() {
            // Trả trạng thái nút về ban đầu khi dừng mic
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            document.getElementById("btn-next").disabled = false;
            document.getElementById("btn-listen").disabled = false;
        };

        recognition.onerror = function(event) {
            if(event.error !== 'no-speech') {
                alert("Lỗi Micro hoặc nhận diện: " + event.error);
                stopRecognition();
            }
        };
    } else {
        alert("Trình duyệt này không hỗ trợ nhận diện giọng nói. Vui lòng dùng Google Chrome / MS Edge!");
    }

    // --- CÁC HÀM CHỨC NĂNG CHÍNH ---

    // 1. Chức năng Nghe đọc thử (Text to Speech)
    function speakSample() {
        if ('speechSynthesis' in window) {
            // Hủy các giọng đọc đang chạy (nếu có)
            window.speechSynthesis.cancel();
            
            const textToSpeak = currentFilteredList[currentIndex].zh;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'zh-CN'; // Đặt giọng tiếng Trung
            
            // Tìm và ưu tiên giọng của Google nếu có sẵn trên máy
            const voices = window.speechSynthesis.getVoices();
            const googleVoice = voices.find(voice => voice.name.includes('Google') && voice.lang.includes('zh'));
            if (googleVoice) utterance.voice = googleVoice;

            window.speechSynthesis.speak(utterance);
        } else {
            alert("Trình duyệt của bạn không hỗ trợ tính năng đọc mẫu.");
        }
    }

    // 2. Chức năng Bắt đầu nói
    function startRecognition() {
        if (!recognition) return;
        isUserStopped = false;
        
        // Cập nhật trạng thái nút bấm
        document.getElementById("btn-start").disabled = true;
        document.getElementById("btn-stop").disabled = false;
        document.getElementById("btn-next").disabled = true;
        document.getElementById("btn-listen").disabled = true;
        document.getElementById("result-box").style.display = "none";

        recognition.start();
    }

    // 3. Chức năng Kết thúc nói
    function stopRecognition() {
        if (!recognition) return;
        isUserStopped = true;
        recognition.stop();
    }

    // 4. Chức năng So sánh và Chấm điểm
    function analyzeSpeech(userSpeech, googleConfidence) {
        const targetSpeech = currentFilteredList[currentIndex].zh;
        
        // Làm sạch chuỗi ký tự (loại bỏ khoảng trắng và dấu câu để đối chiếu chính xác)
        const cleanTarget = targetSpeech.replace(/[，。？！、\s\?]/g, "");
        const cleanUser = userSpeech.replace(/[，。？！、\s\?]/g, "");

        document.getElementById("txt-user-speech").innerText = userSpeech;
        document.getElementById("result-box").style.display = "block";

        let score = 0;
        let feedback = "";

        if (cleanUser === cleanTarget) {
            // Nếu đúng hoàn toàn từng chữ chữ Hán, dựa vào độ bắt âm (Confidence) để cho từ 90 - 100 điểm
            score = Math.round(90 + (googleConfidence * 10));
            feedback = "🔥 Tuyệt vời! Phát âm cực kỳ chuẩn xác.";
        } else {
            // Nếu lệch từ, đếm số chữ Hán chính xác xuất hiện trong câu mẫu
            let correctChars = 0;
            for (let char of cleanUser) {
                if (cleanTarget.includes(char)) {
                    correctChars++;
                }
            }
            // Tính tỷ lệ % đúng
            let matchRatio = correctChars / cleanTarget.length;
            if (matchRatio > 1) matchRatio = 1;
            
            score = Math.round(matchRatio * 85); // Tối đa 85 điểm cho câu bị lệch chữ

            if (score >= 65) {
                feedback = "👍 Khá tốt! Người bản xứ có thể hiểu được bạn.";
            } else if (score >= 40) {
                feedback = "✍️ Phát âm gần đúng, chú ý hơn về thanh điệu và các âm bật hơi.";
            } else {
                feedback = "❌ Chưa chính xác. Hãy bấm nút 'Nghe đọc thử' để luyện lại nhé.";
            }
        }

        // Hiển thị điểm số kèm màu sắc trực quan
        const scoreElement = document.getElementById("txt-score");
        scoreElement.innerText = `Điểm số: ${score} / 100`;
        if (score >= 80) scoreElement.style.color = "#2ecc71";
        else if (score >= 60) scoreElement.style.color = "#e67e22";
        else scoreElement.style.color = "#e74c3c";

        document.getElementById("txt-feedback").innerText = feedback;
        
        // Nếu nhận diện thành công một đoạn khớp, tự động ngắt mic luôn cho tiện lợi
        if(cleanUser === cleanTarget && !isUserStopped) {
            stopRecognition();
        }
    }

    // 5. Chức năng lọc theo Cấp độ HSK
    function changeLevel(level) {
        currentLevel = level;
        
        // Cập nhật hiệu ứng nút bộ lọc được chọn
        const buttons = document.querySelectorAll('.hsk-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Lọc danh sách câu hỏi tương ứng
        if (level === 'ALL') {
            currentFilteredList = [...sentenceBank];
        } else {
            currentFilteredList = sentenceBank.filter(item => item.level === level);
        }

        currentIndex = 0;
        displaySentence();
    }

    // 6. Chức năng Đổi câu khác
    function nextSentence() {
        if(currentFilteredList.length === 0) return;
        // Chuyển câu ngẫu nhiên hoặc tuần tự trong danh sách đã lọc
        currentIndex = (currentIndex + 1) % currentFilteredList.length;
        displaySentence();
    }

    // Hàm cập nhật giao diện hiển thị câu hỏi mới
    function displaySentence() {
        if (currentFilteredList.length === 0) {
            document.getElementById("txt-chinese").innerText = "Chưa có dữ liệu";
            document.getElementById("txt-pinyin").innerText = "";
            document.getElementById("txt-meaning").innerText = "";
            document.getElementById("txt-level").innerText = "-";
            return;
        }

        const item = currentFilteredList[currentIndex];
        document.getElementById("txt-chinese").innerText = item.zh;
        document.getElementById("txt-pinyin").innerText = item.py;
        document.getElementById("txt-meaning").innerText = item.vi;
        document.getElementById("txt-level").innerText = `HSK ${item.level}`;
        
        // Ẩn bảng kết quả cũ đi
        document.getElementById("result-box").style.display = "none";
    }

    // Chạy câu đầu tiên khi mở trang
    // Cần kích hoạt nạp trước giọng đọc cho hệ thống SpeechSynthesis
    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
    }
    displaySentence();
</script>

</body>
</html>
